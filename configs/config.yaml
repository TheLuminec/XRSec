mode: train

seed: 67
epochs: 2
lr: 0.001
batch_size: 2048
num_workers: 0
embedding_dim: 128
sample_time: 2
sample_rate: 20

samples_per_user: 1000

# Support one or many dataset roots.
# Each entry should point to a processed_data/users directory.
data_dirs:
  - processed_datasets/VR_User_Behavior_Dataset_(Spherical_Video_Streaming)/users
  - processed_datasets/ViewGauss_Head-Movement_Dataset/users
  - processed_datasets/Panonut360_Dataset/users
  - processed_datasets/NJIT_6DOF_VR_Navigation_Dataset/users
test_dirs: []
exclude_users: 
 - processed_datasets/VR_User_Behavior_Dataset_(Spherical_Video_Streaming)/users/1
 - processed_datasets/VR_User_Behavior_Dataset_(Spherical_Video_Streaming)/users/2
 - processed_datasets/VR_User_Behavior_Dataset_(Spherical_Video_Streaming)/users/3
 - processed_datasets/VR_User_Behavior_Dataset_(Spherical_Video_Streaming)/users/4
 - processed_datasets/VR_User_Behavior_Dataset_(Spherical_Video_Streaming)/users/5
swap_data: false
test_on_excluded: true

# Naming convention settings (Milestone A)
experiment_name: xrsec

# Use "auto" to enforce standardized names from naming conventions.
save_path: auto
model_path: auto

graph: true
graph_path: auto

boosting:
  enabled: true
  rounds: 10
  round_epochs: 30
  hard_fraction: 0.6
  refresh_fraction: 0.4
  candidate_pairs_per_user: 1500
  match_ratio: 0.5
  artifact_root: boosting
  resume: none

hydra:
  run:
    dir: runs/${now:%Y-%m-%d}/${now:%H-%M-%S}_${mode}
  job:
    chdir: true
