defaults:
  - mode: train
  - _self_

# Shared settings
seed: 42
batch_size: 2048
embedding_dim: 128
sample_time: 1
sample_rate: 10

# Support one or many dataset roots.
# Each entry should point to a processed_data/users directory.
data_dirs:
  - processed_datasets/VR_User_Behavior_Dataset_(Spherical_Video_Streaming)/users
  - processed_datasets/ViewGauss_Head-Movement_Dataset/users
  - processed_datasets/Panonut360_Dataset/users
  - processed_datasets/NJIT_6DOF_VR_Navigation_Dataset/users
test_dirs: []
exclude_users: []
swap_data: false
test_on_excluded: false

# Naming convention settings (Milestone A)
experiment_name: xrsec

# Use "auto" to enforce standardized names from naming conventions.
save_path: auto
model_path: auto

graph: true
graph_path: auto

hydra:
  run:
    dir: runs/${now:%Y-%m-%d}/${now:%H-%M-%S}_${mode}
  job:
    chdir: true
